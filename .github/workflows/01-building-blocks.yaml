name: 01 - Building Blocks 

on: 
  push: 

jobs: 
  echo-hello: 
    runs-on: ubuntu-latest
    steps: 
      - name: Say hello 
        run: echo "Hello, World!"
  echo-goodbye: 
    needs: echo-hello
    runs-on: ubuntu-latest
    steps: 
      - name: Failed step
        run: | 
          echo "Failed step"
          exit 0
      - name: Say goodbye
        run: echo "Goodbye!"